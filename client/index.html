<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <div class="logo">NestSync</div>
            <ul class="nav-links">
                <li class="nav-item active" data-target="cinema">Sync Cinema</li>
                <li class="nav-item" data-target="games">Mini-Games</li>
                <li class="nav-item" data-target="tales">Fairy Tales</li>
            </ul>
        </nav>

        <main class="content">
            <div id="cinema" class="tab-content active">
                <h1>Sync Cinema</h1>
                <p>Enter URL to watch together...</p>
            </div>
            <div id="games" class="tab-content">
                <h1>Mini-Games</h1>
                <p>Loading games...</p>
            </div>
            <div id="tales" class="tab-content">
                <h1>Fairy Tales</h1>
                <p>Read story books...</p>
            </div>
        </main>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
