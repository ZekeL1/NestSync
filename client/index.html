<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestSync</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style> #youtube-player { width: 100%; height: 100%; } </style>
</head>
<body>

    <div id="toast-container"></div>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-box">
            <div style="font-size: 3.5rem; color: #6c5ce7; margin-bottom: 20px;"><i class="fa-solid fa-house-chimney-user"></i></div>
            <h2 id="auth-title" style="margin-bottom: 8px; font-weight:800;">Welcome Home</h2>
            <p id="auth-subtitle" style="color:#636e72; margin-bottom: 30px; font-weight:500;">Connect with your family.</p>

            <form id="login-form">
                <input type="text" id="login-username" class="auth-input" placeholder="Username" required>
                <input type="password" id="login-password" class="auth-input" placeholder="Password" required>
                <button type="submit" class="btn-full">Log In</button>
                <div style="margin-top:20px; font-size:0.9rem; color:#636e72;">
                    No account? <a href="#" id="show-register" style="color:#6c5ce7; font-weight:700; text-decoration:none;">Sign Up</a>
                </div>
                <div id="login-error" style="color:#ff7675; margin-top:10px; font-weight:600;"></div>
            </form>

            <form id="register-form" style="display:none;">
                <input type="text" id="reg-username" class="auth-input" placeholder="Username" required>
                <input type="email" id="reg-email" class="auth-input" placeholder="Email" required>
                <input type="text" id="reg-nickname" class="auth-input" placeholder="Nickname (e.g. Dad)" required>
                <input type="password" id="reg-password" class="auth-input" placeholder="Password" required>
                
                <div style="display:flex; gap:12px; margin-bottom:20px;">
                    <label style="flex:1; cursor:pointer; background:rgba(0,0,0,0.05); padding:10px; border-radius:12px; text-align:center;">
                        <input type="radio" name="role" value="parent" checked> <strong>Parent</strong>
                    </label>
                    <label style="flex:1; cursor:pointer; background:rgba(0,0,0,0.05); padding:10px; border-radius:12px; text-align:center;">
                        <input type="radio" name="role" value="child"> <strong>Child</strong>
                    </label>
                </div>

                <button type="submit" class="btn-full">Create Account</button>
                <div style="margin-top:20px; font-size:0.9rem; color:#636e72;">
                    Has account? <a href="#" id="show-login" style="color:#6c5ce7; font-weight:700; text-decoration:none;">Log In</a>
                </div>
                <div id="reg-error" style="color:#ff7675; margin-top:10px; font-weight:600;"></div>
            </form>
        </div>
    </div>

    <nav class="sidebar glass-panel">
        <div class="titlebar-safe-area"></div>
        <div class="logo"><i class="fa-solid fa-bolt"></i> NestSync</div>
        <ul class="nav-links">
            <li class="active" data-tab="cinema"><i class="fa-solid fa-film"></i> Cinema</li>
            <li data-tab="games"><i class="fa-solid fa-gamepad"></i> Arcade</li>
            <li data-tab="tales"><i class="fa-solid fa-book-open"></i> Tales</li>
        </ul>
        <div class="user-card">
            <div class="avatar" id="current-user-avatar"><i class="fa-solid fa-user"></i></div>
            <div class="user-info">
                <span class="u-name" id="current-user-name">Guest</span>
                <span class="u-role" id="current-user-role"></span>
            </div>
        </div>
    </nav>

    <div class="main-wrapper">
        <header class="topbar glass-panel">
            <div class="status-pill offline" id="status-badge">Offline</div>
            
            <div class="room-controls">
                <input type="text" id="input-room-id" class="input-room" placeholder="Room ID" maxlength="4">
                <button id="btn-join" class="btn-icon" title="Join"><i class="fa-solid fa-arrow-right-to-bracket"></i></button>
                <button id="btn-create" class="btn-primary"><i class="fa-solid fa-plus"></i> New Room</button>
            </div>
        </header>

        <main class="content-area glass-panel">
            <div id="cinema" class="tab-content active-content">
                <div class="cinema-container">
                    <div id="youtube-player"></div>
                    <div id="video-empty-state" class="empty-state">
                        <i class="fa-brands fa-youtube"></i>
                        <p>Waiting for video...</p>
                    </div>
                </div>

                <div class="url-input-wrapper" id="url-control-panel">
                    <input type="text" id="input-video-url" placeholder="Paste YouTube link here...">
                    <button id="btn-load-video" class="btn-circle"><i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>
            
            <div id="games" class="tab-content"><div style="padding:40px; text-align:center; color:#888;"><h1>Games Area</h1></div></div>
            <div id="tales" class="tab-content"><div style="padding:40px; text-align:center; color:#888;"><h1>Tales Area</h1></div></div>
        </main>
    </div>

    <aside class="camera-panel glass-panel">
        <div class="panel-header">Family Link</div>
        
        <div class="cam-wrapper">
            <div class="cam-card remote-cam">
                <video id="remote-video" autoplay playsinline></video>
                <div class="cam-tag">REMOTE</div>
            </div>
            <div class="cam-card local-cam">
                <video id="local-video" autoplay playsinline muted></video>
                <div class="cam-tag">YOU</div>
                <div class="local-controls" id="cam-controls">
                    <button id="btn-toggle-mic" class="icon-btn-sm"><i class="fa-solid fa-microphone"></i></button>
                    <button id="btn-toggle-cam" class="icon-btn-sm"><i class="fa-solid fa-video"></i></button>
                </div>
            </div>
        </div>

        <div class="chat-wrapper">
            <div class="chat-messages" id="chat-messages">
                <div class="chat-msg system"><span>Welcome to chat!</span></div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Say something...">
                <button id="btn-send-chat"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </aside>

    <script src="/socket.io/socket.io.js"></script>
    <script src="renderer.js"></script>
</body>
</html>
