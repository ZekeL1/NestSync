name: Server Tests

on:
  push:
    paths:
      - "server/**"
      - ".github/workflows/server-tests.yml"
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/server-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test
